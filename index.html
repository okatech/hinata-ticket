<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひなたちゃんのごほうび🎆</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'M PLUS Rounded 1c','Kosugi Maru',sans-serif;
    background:linear-gradient(180deg,#1a1448 0%,#2d1f6b 40%,#4a2d8a 100%);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    position:relative;
    touch-action:none;
  }

  /* ⭐ 背景のキラキラ星 */
  .star{
    position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;
    box-shadow:0 0 6px #fff,0 0 12px #ffe;
    animation:twinkle 2s infinite ease-in-out;
  }
  @keyframes twinkle{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

  /* === 画面 === */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .5s;}
  .screen.hidden{opacity:0;pointer-events:none;}

  /* === START 画面 === */
  #start .title{
    font-weight:900;font-size:2.2rem;text-align:center;
    color:#fff;text-shadow:0 0 18px #ff9edb,0 0 30px #ff5fb5;
    margin-bottom:14px;letter-spacing:2px;
  }
  #start .subtitle{
    font-size:1rem;color:#ffd9f0;margin-bottom:50px;text-align:center;font-weight:500;
  }
  .big-btn{
    position:relative;
    padding:28px 54px;
    font-family:inherit;font-size:1.6rem;font-weight:900;
    color:#fff;letter-spacing:3px;
    background:linear-gradient(135deg,#ff6fb5 0%,#ff3d8a 50%,#ff7ac6 100%);
    border:none;border-radius:60px;
    cursor:pointer;
    box-shadow:
      0 10px 0 #c01e6e,
      0 14px 30px rgba(255,61,138,.55),
      inset 0 2px 8px rgba(255,255,255,.4);
    animation:pulse 1.4s infinite ease-in-out;
    transition:transform .1s;
  }
  .big-btn:active{transform:translateY(6px);box-shadow:0 4px 0 #c01e6e,0 6px 14px rgba(255,61,138,.5),inset 0 2px 8px rgba(255,255,255,.4);}
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
  }
  .big-btn::before{
    content:'♡';position:absolute;top:-14px;left:-10px;font-size:1.6rem;color:#fff;
    text-shadow:0 0 10px #ff9edb;animation:float 2s infinite ease-in-out;
  }
  .big-btn::after{
    content:'✨';position:absolute;bottom:-12px;right:-8px;font-size:1.4rem;
    animation:float 2s infinite ease-in-out .7s;
  }
  @keyframes float{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-8px) rotate(8deg);}}

  .hint{margin-top:24px;font-size:.85rem;color:#ffc4e3;}

  /* === REWARD 画面 === */
  #reward{pointer-events:none;}
  #reward.active{pointer-events:auto;}
  .congrats{
    font-weight:900;font-size:2rem;text-align:center;color:#fff;
    text-shadow:0 0 16px #ffea7a,0 0 30px #ff9e4d;
    margin-bottom:8px;opacity:0;transform:translateY(20px) scale(.8);
    transition:all .8s cubic-bezier(.2,.9,.3,1.4);
  }
  .congrats.show{opacity:1;transform:translateY(0) scale(1);}
  .name{
    font-weight:900;font-size:2.4rem;text-align:center;
    background:linear-gradient(90deg,#ffd166,#ff6fb5,#7af0ff,#ffd166);
    background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shine 3s linear infinite;
    margin-bottom:34px;opacity:0;transform:translateY(20px);
    transition:all .8s .3s cubic-bezier(.2,.9,.3,1.4);
  }
  .name.show{opacity:1;transform:translateY(0);}
  @keyframes shine{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

  /* === チケット === */
  .ticket-wrap{
    position:relative;width:min(88vw,360px);height:200px;
    opacity:0;transform:translateY(40px) scale(.85);
    transition:all .9s .6s cubic-bezier(.2,.9,.3,1.4);
  }
  .ticket-wrap.show{opacity:1;transform:translateY(0) scale(1);}
  .ticket-track{
    position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));
    border:2px dashed rgba(255,255,255,.4);
    border-radius:20px;
    display:flex;align-items:center;justify-content:center;
    font-size:.9rem;color:rgba(255,255,255,.7);font-weight:700;letter-spacing:2px;
  }
  .ticket{
    position:absolute;left:0;top:0;width:100%;height:100%;
    background:
      radial-gradient(circle at 15% 50%,transparent 14px,#fff3 14px 15px,transparent 15px),
      radial-gradient(circle at 85% 50%,transparent 14px,#fff3 14px 15px,transparent 15px),
      linear-gradient(135deg,#fff2a8 0%,#ffd166 40%,#ff9e4d 100%);
    border-radius:20px;
    box-shadow:
      0 8px 24px rgba(255,158,77,.5),
      0 0 40px rgba(255,209,102,.6),
      inset 0 2px 10px rgba(255,255,255,.5);
    cursor:grab;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:16px 40px;
    color:#8a3a00;
    transition:transform .35s cubic-bezier(.2,.9,.3,1.4);
    will-change:transform;
  }
  .ticket:active{cursor:grabbing;}
  .ticket .emoji{font-size:2.2rem;margin-bottom:4px;}
  .ticket .ttl{font-weight:900;font-size:1.35rem;letter-spacing:1px;text-shadow:0 1px 0 #fff8;}
  .ticket .sub{font-size:.78rem;margin-top:4px;font-weight:700;opacity:.8;}
  .ticket .arrow{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-size:1.4rem;animation:slide 1.2s infinite ease-in-out;
  }
  @keyframes slide{0%,100%{transform:translateY(-50%) translateX(0);opacity:.6;}50%{transform:translateY(-50%) translateX(8px);opacity:1;}}

  .ticket-perf{
    position:absolute;left:0;right:0;top:50%;height:2px;
    background-image:linear-gradient(to right,#fff 50%,transparent 50%);
    background-size:10px 2px;transform:translateY(-50%);opacity:.5;pointer-events:none;
  }

  /* ✅ ゲット完了 */
  .claimed{
    font-weight:900;font-size:1.6rem;color:#fff;
    text-shadow:0 0 18px #7af0ff,0 0 30px #4ad9ff;
    opacity:0;transform:scale(.6);transition:all .5s cubic-bezier(.2,.9,.3,1.6);
    text-align:center;
  }
  .claimed.show{opacity:1;transform:scale(1);}

  /* === 花火 canvas === */
  canvas#fw{position:absolute;inset:0;pointer-events:none;z-index:5;}

  /* もう一回ボタン */
  .again{
    margin-top:28px;padding:12px 28px;border:none;border-radius:30px;
    background:rgba(255,255,255,.2);color:#fff;font-family:inherit;font-weight:700;
    font-size:.95rem;cursor:pointer;backdrop-filter:blur(8px);
    border:1.5px solid rgba(255,255,255,.4);
    opacity:0;transition:opacity .4s;
  }
  .again.show{opacity:1;}
  .again:active{transform:scale(.95);}
</style>
</head>
<body>

<!-- 背景の星 -->
<div id="stars"></div>

<!-- 花火キャンバス -->
<canvas id="fw"></canvas>

<!-- START 画面 -->
<div class="screen" id="start">
  <div class="title">🌸 ひなたちゃん 🌸</div>
  <div class="subtitle">きょうも よく がんばったね！</div>
  <button class="big-btn" id="goBtn">ボタンをおして</button>
  <div class="hint">↑ ポチッとおしてね</div>
</div>

<!-- REWARD 画面 -->
<div class="screen hidden" id="reward">
  <div class="congrats" id="cong">よくがんばった！</div>
  <div class="name" id="nm">ひなたちゃん 🎉</div>

  <div class="ticket-wrap" id="tw">
    <div class="ticket-track">→ スワイプしてゲット →</div>
    <div class="ticket" id="ticket">
      <div class="ticket-perf"></div>
      <div class="emoji">🎁🧸</div>
      <div class="ttl">おもちゃをかうチケット</div>
      <div class="sub">★ ひなたちゃん せんよう ★</div>
      <div class="arrow">➜</div>
    </div>
  </div>

  <div class="claimed" id="claimed">✨ ゲット！ ✨<br><span style="font-size:1rem;font-weight:700;">おもちゃやさんに いこう！</span></div>
  <button class="again" id="again">もういちど</button>
</div>

<script>
/* ─── 星の背景 ─── */
const starsBox = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=(Math.random()*2)+'s';
  s.style.transform=`scale(${.5+Math.random()*1.2})`;
  starsBox.appendChild(s);
}

/* ─── 花火 ─── */
const cvs=document.getElementById('fw');
const ctx=cvs.getContext('2d');
function resize(){cvs.width=innerWidth;cvs.height=innerHeight;}
resize();addEventListener('resize',resize);

const particles=[];
const COLORS=['#ff6fb5','#ffd166','#7af0ff','#b388ff','#ff9e4d','#a0ff9e','#ffffff','#ff5fb5'];

function firework(x,y){
  const color=COLORS[Math.random()*COLORS.length|0];
  const count=70+Math.random()*40|0;
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const v=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(a)*v,
      vy:Math.sin(a)*v,
      life:1,
      color,
      size:2+Math.random()*2
    });
  }
}

function tick(){
  ctx.fillStyle='rgba(26,20,72,.18)';
  ctx.fillRect(0,0,cvs.width,cvs.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.04;p.vx*=0.99;p.vy*=0.99;
    p.life-=0.012;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowBlur=12;ctx.shadowColor=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  requestAnimationFrame(tick);
}
tick();

function launchShow(){
  let n=0;
  const t=setInterval(()=>{
    firework(
      cvs.width*(0.2+Math.random()*0.6),
      cvs.height*(0.15+Math.random()*0.35)
    );
    if(++n>8)clearInterval(t);
  },300);
}

/* ─── 画面遷移 ─── */
const start=document.getElementById('start');
const reward=document.getElementById('reward');
const cong=document.getElementById('cong');
const nm=document.getElementById('nm');
const tw=document.getElementById('tw');
const ticket=document.getElementById('ticket');
const claimed=document.getElementById('claimed');
const again=document.getElementById('again');

document.getElementById('goBtn').addEventListener('click',()=>{
  start.classList.add('hidden');
  reward.classList.remove('hidden');
  reward.classList.add('active');
  launchShow();
  setTimeout(()=>cong.classList.add('show'),200);
  setTimeout(()=>nm.classList.add('show'),500);
  setTimeout(()=>tw.classList.add('show'),900);
  // 連続花火
  let k=0;
  const loop=setInterval(()=>{
    firework(cvs.width*Math.random(),cvs.height*(0.1+Math.random()*0.4));
    if(++k>6)clearInterval(loop);
  },600);
});

/* ─── チケットスワイプ ─── */
let dragging=false, startX=0, curX=0, maxX=0, claimedDone=false;

function onDown(e){
  if(claimedDone)return;
  dragging=true;
  const p=e.touches?e.touches[0]:e;
  startX=p.clientX;
  maxX=tw.clientWidth-ticket.clientWidth; // 0 (同サイズ) なので余白で判定
  maxX=tw.clientWidth*0.6;
  ticket.style.transition='none';
}
function onMove(e){
  if(!dragging)return;
  const p=e.touches?e.touches[0]:e;
  curX=Math.max(0,p.clientX-startX);
  ticket.style.transform=`translateX(${curX}px) rotate(${curX*0.03}deg)`;
  if(curX>maxX){
    claim();
  }
}
function onUp(){
  if(!dragging)return;
  dragging=false;
  if(!claimedDone){
    ticket.style.transition='transform .4s cubic-bezier(.2,.9,.3,1.4)';
    ticket.style.transform='translateX(0)';
  }
}
function claim(){
  if(claimedDone)return;
  claimedDone=true;dragging=false;
  ticket.style.transition='transform .6s cubic-bezier(.4,0,.2,1),opacity .6s';
  ticket.style.transform=`translateX(${innerWidth}px) rotate(30deg)`;
  ticket.style.opacity='0';
  setTimeout(()=>{
    tw.style.display='none';
    claimed.classList.add('show');
    again.classList.add('show');
    // お祝い追加花火
    for(let i=0;i<4;i++){
      setTimeout(()=>firework(cvs.width*Math.random(),cvs.height*(0.2+Math.random()*0.3)),i*200);
    }
  },500);
}

ticket.addEventListener('mousedown',onDown);
ticket.addEventListener('touchstart',onDown,{passive:true});
addEventListener('mousemove',onMove);
addEventListener('touchmove',onMove,{passive:true});
addEventListener('mouseup',onUp);
addEventListener('touchend',onUp);

/* ─── もういちど ─── */
again.addEventListener('click',()=>location.reload());
</script>
</body>
</html>
