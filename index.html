<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひなたちゃんのごほうび🎆</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'M PLUS Rounded 1c','Kosugi Maru',sans-serif;
    background:linear-gradient(180deg,#1a1448 0%,#2d1f6b 40%,#4a2d8a 100%);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    position:relative;
    touch-action:none;
  }

  /* ⭐ 背景のキラキラ星 */
  .star{
    position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;
    box-shadow:0 0 6px #fff,0 0 12px #ffe;
    animation:twinkle 2s infinite ease-in-out;
  }
  @keyframes twinkle{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

  /* === 画面 === */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .5s;}
  .screen.hidden{opacity:0;pointer-events:none;}

  /* === START 画面 === */
  #start .title{
    font-weight:900;font-size:2.2rem;text-align:center;
    color:#fff;text-shadow:0 0 18px #ff9edb,0 0 30px #ff5fb5;
    margin-bottom:14px;letter-spacing:2px;
  }
  #start .subtitle{
    font-size:1rem;color:#ffd9f0;margin-bottom:50px;text-align:center;font-weight:500;
  }
  .big-btn{
    position:relative;
    padding:28px 54px;
    font-family:inherit;font-size:1.6rem;font-weight:900;
    color:#fff;letter-spacing:3px;
    background:linear-gradient(135deg,#ff6fb5 0%,#ff3d8a 50%,#ff7ac6 100%);
    border:none;border-radius:60px;
    cursor:pointer;
    box-shadow:
      0 10px 0 #c01e6e,
      0 14px 30px rgba(255,61,138,.55),
      inset 0 2px 8px rgba(255,255,255,.4);
    animation:pulse 1.4s infinite ease-in-out;
    transition:transform .1s;
  }
  .big-btn:active{transform:translateY(6px);box-shadow:0 4px 0 #c01e6e,0 6px 14px rgba(255,61,138,.5),inset 0 2px 8px rgba(255,255,255,.4);}
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
  }
  .big-btn::before{
    content:'♡';position:absolute;top:-14px;left:-10px;font-size:1.6rem;color:#fff;
    text-shadow:0 0 10px #ff9edb;animation:float 2s infinite ease-in-out;
  }
  .big-btn::after{
    content:'✨';position:absolute;bottom:-12px;right:-8px;font-size:1.4rem;
    animation:float 2s infinite ease-in-out .7s;
  }
  @keyframes float{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-8px) rotate(8deg);}}

  .hint{margin-top:24px;font-size:.85rem;color:#ffc4e3;}

  /* === REWARD 画面 === */
  #reward{pointer-events:none;}
  #reward.active{pointer-events:auto;}
  .congrats{
    font-weight:900;font-size:2rem;text-align:center;color:#fff;
    text-shadow:0 0 16px #ffea7a,0 0 30px #ff9e4d;
    margin-bottom:8px;opacity:0;transform:translateY(20px) scale(.8);
    transition:all .8s cubic-bezier(.2,.9,.3,1.4);
  }
  .congrats.show{opacity:1;transform:translateY(0) scale(1);}
  .name{
    font-weight:900;font-size:2.4rem;text-align:center;
    background:linear-gradient(90deg,#ffd166,#ff6fb5,#7af0ff,#ffd166);
    background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shine 3s linear infinite;
    margin-bottom:34px;opacity:0;transform:translateY(20px);
    transition:all .8s .3s cubic-bezier(.2,.9,.3,1.4);
  }
  .name.show{opacity:1;transform:translateY(0);}
  @keyframes shine{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

  /* === 封筒＆チケット 表示エリア === */
  .reveal-area{
    position:relative;width:min(88vw,360px);height:260px;
    opacity:0;transform:translateY(40px) scale(.85);
    transition:all .9s .6s cubic-bezier(.2,.9,.3,1.4);
    margin-bottom:48px;
  }
  .reveal-area.show{opacity:1;transform:translateY(0) scale(1);}

  .envelope-wrap{
    position:absolute;inset:0;
    perspective:900px;
    transition:opacity .6s,transform .6s;
  }
  .envelope-wrap.gone{opacity:0;transform:scale(.8);pointer-events:none;}

  .envelope{
    position:absolute;inset:0;border-radius:14px;overflow:visible;
    background:linear-gradient(180deg,#ff8fb8 0%,#ff5fa0 100%);
    box-shadow:0 10px 30px rgba(255,95,160,.5),inset 0 -4px 0 rgba(0,0,0,.08);
  }
  .env-body{
    position:absolute;inset:0;border-radius:14px;
    background:linear-gradient(180deg,#ffaed1 0%,#ff7fb5 100%);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }

  /* 上のフタ（三角） */
  .env-flap{
    position:absolute;left:0;right:0;top:0;height:55%;
    background:linear-gradient(180deg,#ff6faa 0%,#ff4d95 100%);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;
    transition:transform .8s cubic-bezier(.5,-.3,.3,1.6);
    z-index:3;
    box-shadow:0 2px 4px rgba(0,0,0,.1);
  }
  .env-flap.open{transform:rotateX(180deg);}

  /* 封印シール（ハート） — フタの先端に */
  .seal{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(0deg);
    width:52px;height:52px;
    background:radial-gradient(circle at 30% 30%,#fff6f8 0%,#ff4d8e 60%,#c01e6e 100%);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;z-index:5;
    box-shadow:0 3px 8px rgba(0,0,0,.25),inset 0 0 0 2px #fff6;
    transition:transform .4s,opacity .4s;
  }
  .seal.broken{transform:translate(-50%,-50%) rotate(25deg) scale(.5);opacity:0;}

  /* 切り取り線（封筒の上のほう、シールより上） */
  .cut-line{
    position:absolute;left:8%;right:8%;top:18%;height:3px;z-index:4;pointer-events:none;
    background-image:linear-gradient(to right,#fff 60%,transparent 60%);
    background-size:12px 3px;
    -webkit-mask-image:linear-gradient(to right,#000 var(--cut,0%),transparent var(--cut,0%));
            mask-image:linear-gradient(to right,#000 var(--cut,0%),transparent var(--cut,0%));
    opacity:1;
    filter:drop-shadow(0 0 3px #fff8);
  }
  .scissors{
    position:absolute;top:18%;left:8%;transform:translate(-50%,-50%);
    font-size:1.9rem;z-index:6;pointer-events:none;
    transition:left .05s linear;
    filter:drop-shadow(0 2px 4px #0006);
    animation:wiggle 1s infinite ease-in-out;
  }
  @keyframes wiggle{0%,100%{transform:translate(-50%,-50%) rotate(-8deg);}50%{transform:translate(-50%,-50%) rotate(8deg);}}

  /* ヒントは封筒の外、下に */
  .cut-hint{
    position:absolute;left:0;right:0;bottom:-38px;text-align:center;
    color:#fff;font-weight:900;font-size:.95rem;z-index:4;pointer-events:none;
    text-shadow:0 0 10px #ff5fb5,0 1px 3px #0006;letter-spacing:1px;
    animation:bob 1.2s infinite ease-in-out;
  }
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(4px);}}

  /* タッチ領域（封筒全体） */
  .cut-surface{position:absolute;inset:0;z-index:7;cursor:grab;touch-action:none;}
  .cut-surface:active{cursor:grabbing;}

  /* 中のチケット — 封筒が消えたあとにフェードイン */
  .ticket{
    position:absolute;left:0;right:0;top:50%;
    transform:translateY(-50%) scale(.7);
    background:
      radial-gradient(circle at 5% 50%,transparent 12px,#fff4 12px 13px,transparent 13px),
      radial-gradient(circle at 95% 50%,transparent 12px,#fff4 12px 13px,transparent 13px),
      linear-gradient(135deg,#fff2a8 0%,#ffd166 40%,#ff9e4d 100%);
    border-radius:18px;
    box-shadow:0 10px 30px rgba(255,158,77,.6),0 0 50px rgba(255,209,102,.7),inset 0 2px 12px rgba(255,255,255,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px 24px;color:#8a3a00;
    opacity:0;pointer-events:none;
    transition:opacity .7s .3s,transform .9s .3s cubic-bezier(.2,.9,.3,1.6);
  }
  .ticket.out{opacity:1;transform:translateY(-50%) scale(1) rotate(-2deg);pointer-events:auto;}
  .ticket .emoji{font-size:2.4rem;line-height:1;margin-bottom:6px;}
  .ticket .ttl{font-weight:900;font-size:1.35rem;letter-spacing:1px;text-shadow:0 1px 0 #fff8;text-align:center;}
  .ticket .sub{font-size:.85rem;margin-top:4px;font-weight:700;opacity:.85;}
  .ticket .limit{
    margin-top:10px;font-size:.8rem;font-weight:900;line-height:1.4;
    color:#c02a00;text-align:center;letter-spacing:.5px;
    border-top:2px dashed #c02a0066;padding-top:8px;width:90%;
  }

  /* ✅ ゲット完了 */
  .claimed{
    font-weight:900;font-size:1.6rem;color:#fff;
    text-shadow:0 0 18px #7af0ff,0 0 30px #4ad9ff;
    opacity:0;transform:scale(.6);transition:all .5s cubic-bezier(.2,.9,.3,1.6);
    text-align:center;
    margin-top:20px;
  }
  .claimed.show{opacity:1;transform:scale(1);}

  /* === 花火 canvas（画面のうしろ） === */
  canvas#fw{position:fixed;inset:0;pointer-events:none;z-index:1;}
  .screen{z-index:10;}
</style>
</head>
<body>

<!-- 背景の星 -->
<div id="stars"></div>

<!-- 花火キャンバス -->
<canvas id="fw"></canvas>

<!-- START 画面 -->
<div class="screen" id="start">
  <div class="title">🌸 ひなたちゃん 🌸</div>
  <div class="subtitle">きょうも よく がんばったね！</div>
  <button class="big-btn" id="goBtn">ボタンをおして</button>
  <div class="hint">↑ ポチッとおしてね</div>
</div>

<!-- REWARD 画面 -->
<div class="screen hidden" id="reward">
  <div class="congrats" id="cong">よくがんばった！</div>
  <div class="name" id="nm">ひなたちゃん 🎉</div>

  <div class="reveal-area" id="tw">
    <div class="envelope-wrap" id="envWrap">
      <div class="envelope">
        <div class="env-body"></div>
        <div class="env-flap" id="flap"></div>
        <div class="seal" id="seal">💖</div>
        <div class="cut-line" id="cutLine" style="--cut:0%"></div>
        <div class="scissors" id="scissors">✂️</div>
        <div class="cut-hint" id="cutHint">ゆびで ここを きってね →</div>
        <div class="cut-surface" id="cutSurface"></div>
      </div>
    </div>

    <div class="ticket" id="ticket">
      <div class="emoji">🎁🧸</div>
      <div class="ttl">おもちゃをかうチケット</div>
      <div class="sub">★ ひなたちゃん せんよう ★</div>
      <div class="limit">3,000えんまでのおもちゃ<br>1まい かぎり</div>
    </div>
  </div>

  <div class="claimed" id="claimed">✨ ゲット！ ✨<br><span style="font-size:1rem;font-weight:700;">おもちゃやさんに いこう！</span></div>
</div>

<script>
/* ─── 星の背景 ─── */
const starsBox = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=(Math.random()*2)+'s';
  s.style.transform=`scale(${.5+Math.random()*1.2})`;
  starsBox.appendChild(s);
}

/* ─── 花火 ─── */
const cvs=document.getElementById('fw');
const ctx=cvs.getContext('2d');
function resize(){cvs.width=innerWidth;cvs.height=innerHeight;}
resize();addEventListener('resize',resize);

const particles=[];
const COLORS=['#ff6fb5','#ffd166','#7af0ff','#b388ff','#ff9e4d','#a0ff9e','#ffffff','#ff5fb5'];

function firework(x,y){
  const color=COLORS[Math.random()*COLORS.length|0];
  const count=70+Math.random()*40|0;
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const v=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(a)*v,
      vy:Math.sin(a)*v,
      life:1,
      color,
      size:2+Math.random()*2
    });
  }
}

function tick(){
  ctx.fillStyle='rgba(26,20,72,.18)';
  ctx.fillRect(0,0,cvs.width,cvs.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.04;p.vx*=0.99;p.vy*=0.99;
    p.life-=0.012;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowBlur=12;ctx.shadowColor=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  requestAnimationFrame(tick);
}
tick();

function launchShow(){
  let n=0;
  const t=setInterval(()=>{
    firework(
      cvs.width*(0.2+Math.random()*0.6),
      cvs.height*(0.15+Math.random()*0.35)
    );
    if(++n>8)clearInterval(t);
  },300);
}

/* ─── 画面遷移 ─── */
const start=document.getElementById('start');
const reward=document.getElementById('reward');
const cong=document.getElementById('cong');
const nm=document.getElementById('nm');
const tw=document.getElementById('tw');
const ticket=document.getElementById('ticket');
const claimed=document.getElementById('claimed');

document.getElementById('goBtn').addEventListener('click',(ev)=>{
  // ボタン位置からも花火！
  const r=ev.currentTarget.getBoundingClientRect();
  firework(r.left+r.width/2, r.top+r.height/2);
  start.classList.add('hidden');
  reward.classList.remove('hidden');
  reward.classList.add('active');
  launchShow();
  setTimeout(()=>cong.classList.add('show'),200);
  setTimeout(()=>nm.classList.add('show'),500);
  setTimeout(()=>tw.classList.add('show'),900);
  // 連続花火
  let k=0;
  const loop=setInterval(()=>{
    firework(cvs.width*Math.random(),cvs.height*(0.1+Math.random()*0.4));
    if(++k>6)clearInterval(loop);
  },600);
});

/* ─── 封筒を指で切って開ける ─── */
const envWrap=document.getElementById('envWrap');
const flap=document.getElementById('flap');
const seal=document.getElementById('seal');
const cutLine=document.getElementById('cutLine');
const scissors=document.getElementById('scissors');
const cutHint=document.getElementById('cutHint');
const cutSurface=document.getElementById('cutSurface');

let dragging=false, startX=0, progress=0, claimedDone=false;

function getX(e){return (e.touches?e.touches[0]:e).clientX;}

function onDown(e){
  if(claimedDone)return;
  dragging=true;
  startX=getX(e);
  cutHint.style.opacity='0';
}
function onMove(e){
  if(!dragging||claimedDone)return;
  const rect=cutSurface.getBoundingClientRect();
  const x=getX(e)-rect.left;
  const pct=Math.max(0,Math.min(100,(x/rect.width)*100));
  progress=pct;
  cutLine.style.setProperty('--cut',pct+'%');
  scissors.style.left=Math.max(10,Math.min(90,pct))+'%';
  if(pct>92){
    openEnvelope();
  }
}
function onUp(){
  dragging=false;
  if(!claimedDone && progress<92){
    cutHint.style.opacity='1';
  }
}

function openEnvelope(){
  if(claimedDone)return;
  claimedDone=true;dragging=false;
  cutLine.style.setProperty('--cut','100%');
  seal.classList.add('broken');
  scissors.style.display='none';
  cutHint.style.display='none';
  // フタをパタンと開く
  setTimeout(()=>flap.classList.add('open'),150);
  // 封筒全体をフェードアウト
  setTimeout(()=>envWrap.classList.add('gone'),700);
  // チケットがフェードイン
  setTimeout(()=>ticket.classList.add('out'),900);
  // お祝いメッセージと花火
  setTimeout(()=>{
    claimed.classList.add('show');
    for(let i=0;i<5;i++){
      setTimeout(()=>firework(cvs.width*Math.random(),cvs.height*(0.2+Math.random()*0.3)),i*200);
    }
  },1600);
}

cutSurface.addEventListener('mousedown',onDown);
cutSurface.addEventListener('touchstart',onDown,{passive:true});
addEventListener('mousemove',onMove);
addEventListener('touchmove',onMove,{passive:true});
addEventListener('mouseup',onUp);
addEventListener('touchend',onUp);

</script>
</body>
</html>
